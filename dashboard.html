<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Siswa - TIK Smart Learning</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-br from-indigo-950 via-slate-900 to-emerald-950 min-h-screen text-white">

    <header class="p-6 flex justify-between items-center bg-black/40 backdrop-blur-md border-b border-white/10">
        <h1 class="text-2xl font-black text-emerald-400">⚡ PANEL STUDENT</h1>
        <button onclick="logout()"
            class="bg-red-500/20 border border-red-500 hover:bg-red-600 px-4 py-2 rounded-xl text-sm font-bold cursor-pointer transition">Logout
            🚪</button>
    </header>

    <main class="container mx-auto px-6 py-12 max-w-4xl">
        <div class="bg-white/10 border border-white/20 p-8 rounded-3xl backdrop-blur-md mb-8">
            <h2 class="text-3xl font-extrabold text-yellow-300 mb-2">Selamat Datang di Ruang Utama!</h2>
            <p class="text-gray-300">Akun terverifikasi Firebase Cloud Auth. Kamu memiliki hak penuh melihat capaian
                akademi kelas.</p>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-black/30 p-6 rounded-2xl border border-white/5 text-center">
                <span class="block text-4xl mb-2">🏆</span>
                <h4 class="text-lg font-bold">Peringkat Kelas</h4>
                <p class="text-2xl font-black text-emerald-400 mt-2">#1 <span
                        class="text-sm font-normal text-gray-400">dari 35 siswa</span></p>
            </div>
            <div class="bg-black/30 p-6 rounded-2xl border border-white/5 text-center">
                <span class="block text-4xl mb-2">🎯</span>
                <h4 class="text-lg font-bold">Evaluasi Kuis</h4>
                <p class="text-2xl font-black text-pink-400 mt-2">5 <span class="text-sm font-normal text-gray-400">Soal
                        Kompleks</span></p>
            </div>
            <div class="bg-black/30 p-6 rounded-2xl border border-white/5 text-center">
                <span class="block text-4xl mb-2">⚡</span>
                <h4 class="text-lg font-bold">Status Kehadiran</h4>
                <p class="text-2xl font-black text-cyan-400 mt-2">100% <span
                        class="text-sm font-normal text-gray-400">Hadir</span></p>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="index.html"
                class="inline-block bg-white/10 hover:bg-white/20 border border-white/20 px-6 py-3 rounded-xl font-bold transition">🏡
                Kembali Ke Beranda Umum</a>
        </div>
    </main>

    <script>
        if (localStorage.getItem('login_status') !== 'true') { window.location.href = 'login.html'; }
        function logout() { localStorage.removeItem('login_status'); window.location.href = 'index.html'; }
    </script>
</body>

</html>
