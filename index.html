<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Pembelajaran TIK</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<body
    class="bg-gradient-to-br from-indigo-900 via-purple-800 to-pink-700 min-h-screen text-white font-sans overflow-x-hidden">

    <header class="p-6 flex justify-between items-center backdrop-blur-md bg-white/10 sticky top-0 z-50">
        <h1 class="text-2xl font-black tracking-wider animate__animated animate__bounceInLeft">⚡ TIK SMART LEARNING</h1>
        <nav class="space-x-6 text-lg font-semibold">
            <a href="index.html" class="hover:text-pink-400 transition duration-300">Home</a>
            <a href="materi.html" class="hover:text-pink-400 transition duration-300">Materi</a>
            <a href="kuis.html" class="hover:text-pink-400 transition duration-300">Kuis Interaktif</a>
            <a href="profil.html" class="hover:text-pink-400 transition duration-300 text-yellow-300">Profil</a>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12 text-center">
        <div class="animate__animated animate__zoomIn">
            <h2
                class="text-5xl md:text-7xl font-extrabold mb-6 bg-clip-text text-transparent bg-gradient-to-r from-yellow-300 to-pink-400">
                Belajar TIK Jadi Lebih Seru!
            </h2>
            <p class="text-xl md:text-2xl text-purple-200 max-w-2xl mx-auto mb-12">
                Eksplorasi dunia teknologi, pemrograman, dan multimedia dengan metode yang interaktif dan menyenangkan.
            </p>
        </div>

        <div
            class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto mb-16 bg-black/20 p-6 rounded-3xl backdrop-blur-md border border-white/10 animate__animated animate__fadeInUp">
            <div class="p-4 text-center">
                <span class="block text-3xl md:text-4xl font-black text-yellow-400 font-mono"
                    id="visitor-count">1,240</span>
                <span class="text-xs md:text-sm text-purple-200 uppercase tracking-wider font-semibold">Total
                    Pengunjung</span>
            </div>
            <div class="p-4 text-center border-l border-white/10">
                <span class="block text-3xl md:text-4xl font-black text-green-400 font-mono" id="user-visit">1</span>
                <span class="text-xs md:text-sm text-purple-200 uppercase tracking-wider font-semibold">Kunjungan
                    Anda</span>
            </div>
            <div class="p-4 text-center border-l border-white/10">
                <span class="block text-3xl md:text-4xl font
